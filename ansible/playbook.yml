---
- name: Configure Minecraft Server
  hosts: minecraft
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Java 25
      apt:
        name: openjdk-25-jre-headless
        state: present

    - name: Create minecraft directory
      file:
        path: /home/ubuntu/minecraft
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Get latest Minecraft server JAR URL
      shell: |
        curl -s https://launchermeta.mojang.com/mc/game/version_manifest_v2.json | python3 -c "
        import sys,json,urllib.request
        d=json.load(sys.stdin)
        latest=d['latest']['release']
        for v in d['versions']:
            if v['id']==latest:
                meta=json.loads(urllib.request.urlopen(v['url']).read())
                print(meta['downloads']['server']['url'])
                break
        "
      register: jar_url

    - name: Download Minecraft server JAR
      get_url:
        url: "{{ jar_url.stdout }}"
        dest: /home/ubuntu/minecraft/minecraft_server.jar
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Accept EULA
      copy:
        content: "eula=true\n"
        dest: /home/ubuntu/minecraft/eula.txt
        owner: ubuntu
        group: ubuntu

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/minecraft.service
        content: |
          [Unit]
          Description=Minecraft Server
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory=/home/ubuntu/minecraft
          ExecStart=/usr/bin/java -Xmx3G -Xms1G -jar minecraft_server.jar nogui
          ExecStop=/bin/kill -s SIGTERM $MAINPID
          TimeoutStopSec=60
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start Minecraft service
      systemd:
        name: minecraft
        enabled: yes
        state: started
        daemon_reload: yes
